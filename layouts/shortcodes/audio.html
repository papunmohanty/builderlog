<div class="audio-player">

    {{ with .Get "title" }}
    <h4>{{ . }}</h4>
    {{ end }}

    <audio controls preload="metadata">

    <source
        src="{{ .Get "src" }}"
        type="{{ .Get "type" | default "audio/mpeg" }}"
    >
    </audio>

    {{ with .Get "caption" }}
    <p>{{ . }}</p>
{{ end }}

</div>
